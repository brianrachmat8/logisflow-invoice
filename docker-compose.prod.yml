services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: logis_invoice
      POSTGRES_USER: logis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logis -d logis_invoice"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://logis:${POSTGRES_PASSWORD}@db:5432/logis_invoice?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      APP_URL: ${APP_URL}
      STORAGE_PATH: /app/storage
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - invoice_files:/app/storage

  migrate:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://logis:${POSTGRES_PASSWORD}@db:5432/logis_invoice?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      APP_URL: ${APP_URL}
      STORAGE_PATH: /app/storage
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - invoice_files:/app/storage
    command: ["sh", "-c", "pnpm db:deploy"]

  seed:
    build:
      context: .
      target: builder
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://logis:${POSTGRES_PASSWORD}@db:5432/logis_invoice?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      APP_URL: ${APP_URL}
      STORAGE_PATH: /app/storage
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - invoice_files:/app/storage
    command: ["sh", "-c", "pnpm db:seed"]

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  invoice_files:
  caddy_data:
  caddy_config:

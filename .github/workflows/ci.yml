name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: postgresql://logis:logis@localhost:5432/logis_invoice?schema=public
      AUTH_SECRET: ci-auth-secret-minimal-32-characters
      AUTH_TRUST_HOST: "true"
      APP_URL: http://localhost:3000
      STORAGE_PATH: ./storage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build app
        run: pnpm build

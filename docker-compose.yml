services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: logis_invoice
      POSTGRES_USER: logis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ganti-password-kuat}
      TZ: Asia/Jakarta
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logis -d logis_invoice"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://logis:${POSTGRES_PASSWORD:-ganti-password-kuat}@db:5432/logis_invoice?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      STORAGE_PATH: /app/storage
      TZ: Asia/Jakarta
    volumes:
      - invoice_files:/app/storage

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  invoice_files:
